<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmography | Unhinged Cinema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">UNHINGED<span>FLIX</span></div>
        <div class="controls">
            <input type="text" id="search-input" placeholder="Search title, director, or year...">
            
            <select id="genre-select">
                <option value="All">All Genres</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Mystery">Mystery</option>
                <option value="Horror">Horror</option>
                <option value="Thriller">Thriller</option>
                <option value="Drama">Drama</option>
            </select>
        </div>
    </header>
    

    <main>
        <section class="results-info">
            <p id="movie-count">Showing all movies</p>
        </section>

        <div id="movie-grid">
            </div>
    </main>

    <button id="back-to-top" title="Go to top">↑ Back to top</button>

    

    <div id="movie-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <img id="modal-poster" src="" alt="">
        <h2 id="modal-title"></h2>
        <p id="modal-info"></p>
        <p id="modal-description"></p>

        <a id="modal-link" href="#" target="_blank">View on IMDb</a>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
